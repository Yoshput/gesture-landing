<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Recognition - Cute AI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <!-- MediaPipe CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #FFF0F5; /* Lavender Blush / Pink Pastel Muda */
            --main-pink: #FFB6C1; /* Light Pink */
            --dark-pink: #FF69B4; /* Hot Pink */
            --text-dark: #C71585; /* Medium Violet Red / Magenta Tua */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-weight: 700;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #splash-screen h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            color: var(--dark-pink);
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #fff;
        }

        .btn-cute {
            font-family: 'Fredoka One', cursive;
            background-color: var(--dark-pink);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #C71585;
            transition: all 0.2s ease;
        }

        .btn-cute:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #C71585;
        }

        /* Main Container */
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        h2 {
            font-family: 'Fredoka One', cursive;
            color: var(--dark-pink);
            font-size: 2rem;
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 10px;
        }

        /* UI Elements */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 1.1rem;
        }

        input[type="text"] {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            padding: 12px 20px;
            border: 3px solid var(--main-pink);
            border-radius: 20px;
            outline: none;
            color: var(--text-dark);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--dark-pink);
        }

        /* Badge Guide Panel */
        .guide-panel {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 20px;
            border: 2px dashed var(--main-pink);
        }

        .guide-panel h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            background-color: white;
            border: 2px solid var(--main-pink);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            display: inline-block;
        }

        /* Camera Viewport */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 75%; /* 4:3 Aspect Ratio */
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 4px solid var(--main-pink);
            grid-column: 1 / -1;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror effect to match video */
            z-index: 2;
        }

        /* Status & Audio Bubble */
        #status-text {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: var(--dark-pink);
        }

        .audio-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--dark-pink);
            color: white;
            padding: 15px 25px;
            border-radius: 25px 25px 5px 25px;
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .audio-bubble.active {
            opacity: 1;
            transform: translateY(0);
        }

        .audio-bubble::after {
            content: '🎵';
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <h1>Halo! ✨</h1>
        <button class="btn-cute" id="btn-start">Mulai Aplikasi</button>
    </div>

    <!-- Main Application UI -->
    <div class="container">
        <h2>Gesture Recognition AI 🌸</h2>
        
        <div class="input-group">
            <label for="username">Ketik Namamu di Sini:</label>
            <input type="text" id="username" placeholder="Nama kamu..." value="Teman">
        </div>

        <div class="guide-panel">
            <h3>Daftar Gestur Isyarat:</h3>
            <div class="badge-list">
                <span class="badge">🖐️ Semua Juka -> "Hai"</span>
                <span class="badge">🤙 Kelingking -> "Perkenalkan"</span>
                <span class="badge">☝️ Telunjuk -> "Nama saya"</span>
                <span class="badge">👌 OK (Jempol+Telunjuk) -> "[Nama Kamu]"</span>
                <span class="badge">🤟 Metal -> "Senang bertemu denganmu"</span>
                <span class="badge">✌️ Peace -> "Terima kasih"</span>
            </div>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div id="status-text">Menunggu kamera aktif... 🎥</div>
    </div>

    <!-- Audio Bubble Notification -->
    <div class="audio-bubble" id="audio-bubble">
        Menyuarakan sesuatu...
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');
        const audioBubble = document.getElementById('audio-bubble');
        const usernameInput = document.getElementById('username');

        let lastSpokenGesture = ""; 
        let isSpeaking = false; 

        // 1. Splash Screen Logic & Audio Context Trigger
        document.getElementById('btn-start').addEventListener('click', () => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(0.9)';
            
            // Pancing Audio Context agar Web Speech API diizinkan browser
            if (window.speechSynthesis) {
                let u = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(u);
            }

            setTimeout(() => {
                splash.style.display = 'none';
                initMediaPipe();
            }, 500);
        });

        // 2. Web Speech API (Text To Speech) Function
        function speakindonesian(text) {
            if (isSpeaking || text === lastSpokenGesture) return;

            isSpeaking = true;
            lastSpokenGesture = text;

            // Memunculkan Audio Bubble
            audioBubble.innerText = `"${text}"`;
            audioBubble.classList.add('active');

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';

            utterance.onend = () => {
                isSpeaking = false;
                audioBubble.classList.remove('active');
            };

            utterance.onerror = () => {
                isSpeaking = false;
                audioBubble.classList.remove('active');
            };

            window.speechSynthesis.speak(utterance);
        }

        // Jaga-jaga jika tangan keluar frame, reset status penahan (debounce)
        setInterval(() => {
            if (!videoElement.srcObject) return;
            // Jika dalam 2 detik tidak ada gestur konstan, reset penahan suara
            if(window.speechSynthesis && !window.speechSynthesis.speaking) {
                lastSpokenGesture = "";
            }
        }, 2000);

        // 3. Logika Pendeteksi Gestur
        function analyzeGestures(landmarks) {
            // Mengambil koordinat Y untuk ujung jari (Tip) dan buku jari bawah (MCP)
            const thumbTip = landmarks[4];
            const thumbIp = landmarks[3];
            const indexTip = landmarks[8];
            const indexMcp = landmarks[5];
            const middleTip = landmarks[12];
            const middleMcp = landmarks[9];
            const ringTip = landmarks[16];
            const ringMcp = landmarks[13];
            const pinkyTip = landmarks[20];
            const pinkyMcp = landmarks[17];

            // Cek apakah jari tegak terbuka (Y ujung jari lebih kecil/tinggi daripada Y buku jarinya)
            const isIndexOpen = indexTip.y < indexMcp.y;
            const isMiddleOpen = middleTip.y < middleMcp.y;
            const isRingOpen = ringTip.y < ringMcp.y;
            const isPinkyOpen = pinkyTip.y < pinkyMcp.y;
            
            // Khusus jempol cek horizontal (X) atau jarak vertikal tipis karena anatomi berbeda
            const isThumbOpen = Math.abs(thumbTip.x - thumbIp.x) > 0.03; 

            // Hitung jarak Euclidean antara Ujung Jempol dan Ujung Telunjuk untuk Pose OK
            const distanceThumbIndex = Math.sqrt(
                Math.pow(thumbTip.x - indexTip.x, 2) + 
                Math.pow(thumbTip.y - indexTip.y, 2)
            );
            const isOkPose = distanceThumbIndex < 0.05; // Jarak dekat berarti menyentuh

            // Klasifikasi Gestur:
            
            // 1. POSE OK: Jempol & Telunjuk nempel, 3 jari lain (Middle, Ring, Pinky) terbuka
            if (isOkPose && isMiddleOpen && isRingOpen && isPinkyOpen) {
                const nama = usernameInput.value.trim() || "Teman";
                speakindonesian(nama);
                return "Pose OK: " + nama;
            }

            // 2. SEMUA JARI TERBUKA -> "Hai"
            if (isThumbOpen && isIndexOpen && isMiddleOpen && isRingOpen && isPinkyOpen) {
                speakindonesian("Hai");
                return "Semua Jari Terbuka (Hai)";
            }

            // 3. METAL / SPIDERMAN -> Jempol, Telunjuk, Kelingking Terbuka (Middle & Ring Tertutup)
            if (isIndexOpen && isPinkyOpen && !isMiddleOpen && !isRingOpen) {
                speakindonesian("Senang bertemu denganmu");
                return "Pose Metal (Senang bertemu denganmu)";
            }

            // 4. PEACE / V -> Telunjuk & Jari Tengah Terbuka (Lainnya tertutup)
            if (isIndexOpen && isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                speakindonesian("Terima kasih");
                return "Pose Peace (Terima kasih)";
            }

            // 5. HANYA TELUNJUK -> "Nama saya"
            if (isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                speakindonesian("Nama saya");
                return "Hanya Telunjuk (Nama saya)";
            }

            // 6. HANYA KELINGKING -> "Perkenalkan"
            if (isPinkyOpen && !isIndexOpen && !isMiddleOpen && !isRingOpen) {
                speakindonesian("Perkenalkan");
                return "Hanya Kelingking (Perkenalkan)";
            }

            return "Mendeteksi tangan... (Belum masuk kriteria gestur)";
        }

        // 4. MediaPipe Hands Core Setup
        function onResults(results) {
            // Menyesuaikan ukuran canvas dengan video active
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusText.innerText = "Tangan Terdeteksi! 🌟";
                
                for (const landmarks of results.multiHandLandmarks) {
                    // Gambar Hubungan Tulang (Pink)
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#FF69B4', lineWidth: 4});
                    // Gambar Titik Sendi (Putih)
                    drawLandmarks(canvasCtx, landmarks, {color: '#FFFFFF', fillColor: '#FF69B4', lineWidth: 2, radius: 5});
                    
                    // Analisis Gestur dari tangan pertama yang terdeteksi
                    const gestureStatus = analyzeGestures(landmarks);
                    statusText.innerText = gestureStatus;
                }
            } else {
                statusText.innerText = "Posisikan tanganmu di depan kamera 🖐️";
            }
            canvasCtx.restore();
        }

        function initMediaPipe() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0, // Cepat dan ringan untuk real-time browser
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            
            camera.start().then(() => {
                statusText.innerText = "Kamera Siap! Posisikan tanganmu 🖐️";
            }).catch(err => {
                statusText.innerText = "Gagal mengakses kamera 😢. Pastikan izin diberikan.";
                console.error(err);
            });
        }
    </script>
</body>
</html>
